<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- comhad ("file" in Irish): the mark is a file that doubles as a terminal cell — a
       dog-eared sheet with two lines of "text" and a block cursor, the caret you'd see at a
       prompt. Palette is the app's own dark theme (src/ui/theme.rs, modus_vivendi tinted):
       #0d0e1c background, #2fafff accent, #c0965b gold. The knocked-out detail is the
       background colour showing through. -->
  <rect width="512" height="512" rx="96" fill="#0d0e1c"/>

  <!-- sheet, folded top-right corner -->
  <path d="M146,128 Q146,100 174,100 H294 L366,172 V384 Q366,412 338,412 H174 Q146,412 146,384 Z" fill="#2fafff"/>
  <path d="M294,100 L366,172 H294 Z" fill="#c0965b"/>

  <!-- two lines of text; the gold square is the terminal block cursor -->
  <rect x="182" y="210" width="148" height="18" rx="9" fill="#0d0e1c"/>
  <rect x="182" y="252" width="90" height="18" rx="9" fill="#0d0e1c"/>
  <rect x="284" y="248" width="26" height="26" rx="5" fill="#c0965b"/>
</svg>
